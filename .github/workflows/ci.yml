name: ML CI/CD Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'train.py'
      - 'serve.py'
      - 'tests/**'
      - 'requirements.txt'
      - 'Dockerfile'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      max_iter:
        description: 'Max iterations for model training'
        required: false
        default: '200'
      environment:
        description: 'Deploy environment (staging/production)'
        required: false
        default: 'staging'

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Tests
        run: pytest tests/ -v

  train-and-package:
    name: Train & Package Model
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Train Model
        run: |
          mkdir -p models
          python train.py --max_iter ${{ github.event.inputs.max_iter || '200' }}

      - name: Upload Model Artifact
        uses: actions/upload-artifact@v3
        with:
          name: trained-model
          path: models/model.pkl

      - name: Build Docker Image
        run: docker build -t ml-model:latest .

      - name: Push Docker Image
        if: github.ref == 'refs/heads/main'
        run: |
          echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
          docker tag ml-model:latest ${{ secrets.DOCKER_USERNAME }}/ml-model:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/ml-model:latest

  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: train-and-package
    if: github.ref == 'refs/heads/main'
    env:
      DEPLOY_ENV: ${{ github.event.inputs.environment || 'staging' }}
    steps:
      - uses: actions/checkout@v3

      - name: Deploy to Kubernetes
        run: |
          echo "Deploying to $DEPLOY_ENV"
          kubectl apply -f k8s/deployment.yaml
