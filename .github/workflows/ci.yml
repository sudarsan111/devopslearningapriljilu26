name: CI Quality Gate
# .github/workflows/ci.yml — must pass before any merge to main
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov ruff bandit

      - name: Run tests
        run: pytest --cov=. --cov-fail-under=80

      - name: Lint
        run: ruff check .

      - name: Security scan
        run: bandit -r src/
