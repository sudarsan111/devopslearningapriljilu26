name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
    paths:
      - "pythonapp/**"
  pull_request:
    paths:
      - "pythonapp/**"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pythonapp

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Run tests
      run: |
        pytest

    - name: Build (optional)
      run: echo "Build successful"

    - name: Deploy (example)
      run: echo "Deploy step here"
