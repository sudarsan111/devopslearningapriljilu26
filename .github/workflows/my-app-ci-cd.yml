name: my-app CI/CD

# Triggers: only when files inside my-app/ change
on:
  push:
    branches: [main, develop]
    paths:
      - "my-app/**"
      - ".github/workflows/my-app-ci-cd.yml"
  pull_request:
    branches: [main]
    paths:
      - "my-app/**"

jobs:

  # ── STEP 1: Lint ─────────────────────────────────────────────────────────
  # Check code style with ruff before wasting time running tests
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: my-app        # all `run:` steps execute inside my-app/

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: my-app/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ruff linter
        run: ruff check .

  # ── STEP 2: Test ──────────────────────────────────────────────────────────
  # Run pytest with 80% coverage gate — only after lint passes
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint                          # waits for lint to pass first
    defaults:
      run:
        working-directory: my-app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: my-app/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        run: pytest --cov=app --cov-fail-under=80 -v

  # ── STEP 3: Security ──────────────────────────────────────────────────────
  # Run bandit security scan — runs in parallel with test (both need lint)
  security:
    name: Security scan
    runs-on: ubuntu-latest
    needs: lint                          # runs parallel with test, both need lint
    defaults:
      run:
        working-directory: my-app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install bandit
        run: pip install bandit==1.7.6

      - name: Run security scan
        run: bandit -r app.py

  # ── STEP 4: Build Docker image ────────────────────────────────────────────
  # Only runs after BOTH test and security pass
  build:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    needs: [test, security]             # both gates must pass
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/my-app
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: my-app
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── STEP 5: Deploy to staging ─────────────────────────────────────────────
  # Runs only on the develop branch — after image is built
  deploy-staging:
    name: Deploy to staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: http://${{ secrets.STAGING_HOST }}:8080

    steps:
      - name: SSH deploy to staging server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            docker pull ghcr.io/${{ github.repository }}/my-app:develop
            docker stop my-app-staging || true
            docker rm   my-app-staging || true
            docker run -d \
              --name my-app-staging \
              --restart unless-stopped \
              -p 8080:5000 \
              ghcr.io/${{ github.repository }}/my-app:develop

  # ── STEP 6: Deploy to production ──────────────────────────────────────────
  # Runs only on the main branch — after image is built
  # Add required reviewers in GitHub → Settings → Environments → production
  deploy-production:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: http://${{ secrets.PROD_HOST }}

    steps:
      - name: SSH deploy to production server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            docker pull ghcr.io/${{ github.repository }}/my-app:latest
            docker stop my-app-prod || true
            docker rm   my-app-prod || true
            docker run -d \
              --name my-app-prod \
              --restart unless-stopped \
              -p 80:5000 \
              ghcr.io/${{ github.repository }}/my-app:latest
