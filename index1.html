<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Demo Webpage</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f8;
        }

        header {
            background: #2c3e50;
            color: white;
            padding: 15px 20px;
            text-align: center;
        }

        nav {
            background: #34495e;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            text-decoration: underline;
        }

        .container {
            padding: 30px;
            text-align: center;
        }

        .card {
            background: white;
            padding: 20px;
            margin: 20px auto;
            max-width: 500px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        footer {
            background: #2c3e50;
            color: white;
            text-align: center;
            padding: 10px;
            position: fixed;
            width: 100%;
            bottom: 0;
        }
    </style>
</head>

<body>

<header>
    <h1>Welcome to My Demo Website 🚀</h1>
    <p>Deployed using EC2 + Git + DevOps</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Services</a>
    <a href="#">Contact</a>
</nav>

<div class="container">
    <div class="card">
        <h2>Hello, Sudarsan 👋</h2>
        <p>This is your demo webpage.</p>
        <p>You can host this on AWS EC2 using Nginx or Apache.</p>
        <button onclick="showMessage()">Click Me</button>
    </div>
</div>

<footer>
    <p>© 2026 My Demo Project | DevOps Practice</p>
</footer>

<script>
    function showMessage() {
        alert("Your website is working successfully! 🎉");
    }
</script>

</body>
</html>
