<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Demo App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            margin: 0;
            padding: 0;
            color: #333;
            text-align: center;
        }
        header {
            background: #222;
            color: #fff;
            padding: 20px;
        }
        section {
            padding: 40px;
        }
        .card {
            background: #fff;
            margin: 20px auto;
            padding: 20px;
            width: 300px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        footer {
            background: #222;
            color: #fff;
            padding: 10px;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body>

<header>
    <h1>🚀 Welcome to My EC2 Demo</h1>
    <p>Deployed using AWS EC2</p>
</header>

<section>
    <div class="card">
        <h2>About</h2>
        <p>This is a sample web page deployed on an EC2 instance for demo purposes.</p>
    </div>

    <div class="card">
        <h2>Features</h2>
        <p>✔ Simple HTML & CSS<br>
           ✔ Hosted on cloud<br>
           ✔ Accessible via public IP</p>
    </div>

    <div class="card">
        <h2>Contact</h2>
        <p>Email: demo@example.com</p>
    </div>
</section>

<footer>
    <p>© 2026 Demo Project | DevOps Practice</p>
</footer>

</body>
</html>
