# .github/workflows/ci.yml — must pass before any merge to main
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        run: pytest --cov=. --cov-fail-under=80
      - name: Lint
        run: ruff check .
      - name: Security scan
        run: bandit -r src/